# GRPO Training Config: Qwen2-VL-2B Vision - Colocate Mode (Dual GPU)
# Target: 2x RTX 2080 Ti - Uses tensor parallelism for faster inference

model_name_or_path: "Qwen/Qwen2-VL-2B-Instruct"
use_vision: true

# Training (conservative for 11GB VRAM per GPU)
num_train_epochs: 3
learning_rate: 5.0e-6
batch_size: 1
gradient_accumulation_steps: 8
warmup_ratio: 0.1
max_grad_norm: 1.0

# vLLM (colocate mode with tensor parallelism across both GPUs)
use_vllm: true
vllm_mode: "colocate"
vllm_tensor_parallel_size: 2  # Use both GPUs for inference

# Environment
openenv_server_url: "http://localhost:8000"
max_episode_steps: 50
num_parallel_envs: 1

# Generation
max_completion_length: 100
num_generations: 4
temperature: 1.0

# Rewards
reward_weights:
  task_success: 1.0
  efficiency: 0.3
  diversity: 0.1

# Output
output_dir: "./checkpoints/qwen2b-vision-colocate"
save_steps: 100
push_to_hub: false

# Logging (trackio)
project_name: "computer-rl-qwen2b"
